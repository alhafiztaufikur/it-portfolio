<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al Hafiz Taufikur Rohman | Network Engineer Portfolio</title>
    <meta name="description"
        content="Professional portfolio of Al Hafiz Taufikur Rohman, a Network Automation & Systems Engineer. Showcasing automated infrastructures, CCNA certifications, and Python/Ansible scripting solutions.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- CSS Stylesheet -->
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

    <!-- Splash Screen Overlay -->
    <div id="splash-screen">
        <div class="splash-content">
            <div class="network-loader">
                <div class="loader-circle"></div>
                <div class="loader-nodes">
                    <span class="node n1"></span>
                    <span class="node n2"></span>
                    <span class="node n3"></span>
                    <span class="node n4"></span>
                </div>
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-network loader-center-icon">
                    <rect x="16" y="16" width="6" height="6" rx="1" />
                    <rect x="2" y="16" width="6" height="6" rx="1" />
                    <rect x="9" y="2" width="6" height="6" rx="1" />
                    <path d="M12 8v8" />
                    <path d="M12 12H5v4" />
                    <path d="M12 12h7v4" />
                </svg>
            </div>
            <div class="splash-text">
                <span class="splash-title">HAFIZ.NET</span>
                <span class="splash-status">Establishing Secure Connection...</span>
            </div>
        </div>
    </div>

    <!-- Canvas for Network Animation -->
    <canvas id="network-canvas"></canvas>

    <!-- Header Navigation -->
    <header class="navbar">
        <div class="nav-container">
            <a href="#" class="logo">
                HAFIZDEV
            </a>
            <nav class="nav-menu" id="nav-menu">
                <a href="#hero" class="nav-link active">Beranda</a>
                <a href="#about" class="nav-link">Tentang Saya</a>
                <a href="#experience" class="nav-link">Pengalaman</a>
                <a href="#skills" class="nav-link">Keahlian</a>
                <a href="#certifications" class="nav-link">Sertifikasi</a>
                <a href="#projects" class="nav-link">Proyek</a>
                <a href="#blog" class="nav-link">Blog</a>
                <a href="#contact" class="nav-link btn-connect-mobile">Hubungi Saya</a>
            </nav>
            <div class="nav-actions">
                <button class="theme-toggle-btn" id="theme-toggle" aria-label="Toggle Theme">
                    <i data-lucide="sun"></i>
                </button>
                <a href="#contact" class="btn-connect">
                    <span>Hubungi Saya</span>
                    <span class="btn-arrow-circle">
                        <i data-lucide="arrow-up-right"></i>
                    </span>
                </a>
                <button class="menu-toggle" id="menu-toggle" aria-label="Toggle Menu">
                    <i data-lucide="menu"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Components Injection Shell -->
    <main>
        <!-- Hero Section Component -->
        <div id="hero-component"></div>

        <!-- About Me Section Component -->
        <div id="about-component"></div>

        <!-- Experience Section Component -->
        <div id="experience-component"></div>

        <!-- Skills Section Component -->
        <div id="skills-component"></div>

        <!-- Certifications Section Component -->
        <div id="certifications-component"></div>

        <!-- Projects Section Component -->
        <div id="projects-component"></div>

        <!-- Blog / Technical Notes Section Component -->
        <div id="blog-component"></div>

        <!-- Contact Section Component -->
        <div id="contact-component"></div>
    </main>
 
    <!-- Certificate Detail Modal Overlay -->
    <div id="cert-modal" class="cert-modal-overlay">
        <div class="cert-modal-container glass">
            <button class="cert-modal-close" id="cert-modal-close-btn" aria-label="Close Modal">
                <i data-lucide="x"></i>
            </button>
            <div class="cert-modal-body">
                <!-- Left Side: Image Preview -->
                <div class="cert-modal-left">
                    <img id="cert-modal-img" src="" alt="Certificate Image Preview">
                </div>
                <!-- Right Side: Details Content -->
                <div class="cert-modal-right">
                    <span id="cert-modal-issuer" class="cert-issuer"></span>
                    <h3 id="cert-modal-title" class="cert-title"></h3>
                    <div class="cert-modal-divider"></div>
                    <p id="cert-modal-desc" class="cert-desc"></p>
                    
                    <div class="cert-modal-meta-grid">
                        <div>
                           <span class="meta-label">STATUS VERIFIKASI</span>
                           <span id="cert-modal-status" class="meta-value">Sertifikasi Aktif</span>
                        </div>
                        <div>
                           <span class="meta-label">PENERBIT</span>
                           <span id="cert-modal-issuer-short" class="meta-value">Cisco Academy</span>
                        </div>
                    </div>
                    
                    <a id="cert-modal-link" href="" target="_blank" class="btn-verify">
                        <span>Lihat Dokumen Asli</span>
                        <i data-lucide="external-link"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>
 
    <!-- Orchestrator Script file -->
    <script type="module" src="assets/js/main.js"></script>
</body>
</html>
